on:
  push:
    branches:
      - master
      - main

name: release-please

# Serialize release-please runs on the same branch. Cancelling in-flight
# releases could leave a release commit on main without a matching tag,
# so wait rather than cancel.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: fohte
          identity: ${{ github.event.repository.name }}-release-please
          domain: octo-sts.fohte.net

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.octo-sts.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Adds a follow-up commit on main that force-adds the built `dist/` bundle,
  # then moves the version tag (and, for stable releases, the floating major
  # tag) from the release commit onto that dist commit.
  #
  # The version tag must live on a commit reachable from main: release-please
  # walks history from the default branch's tip back to the most recent
  # release tag to decide "what's the last released version". A tag on an
  # unreachable commit makes release-please treat every commit since the
  # previous reachable tag — including the release commit itself — as
  # unreleased, and the next release PR silently reuses the current version.
  #
  # Between releases the tracked `dist/` files on main are stale. Callers
  # resolve `uses: fohte/copier-update-action@vX.Y.Z` (or `@v1`) to the
  # tagged commit, not to main's tip.
  attach-dist:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: fohte
          identity: ${{ github.event.repository.name }}-release-please
          domain: octo-sts.fohte.net

      # Check out the default branch, not the release tag. release-please
      # has already pushed the release commit to main by the time this job
      # runs (`needs: release-please`), so main's tip is that commit and
      # the new dist commit will land directly on top of it.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref_name }}
          token: ${{ steps.octo-sts.outputs.token }}
          persist-credentials: true
          fetch-depth: 0

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.0

      - run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Commit dist/ to main and move release tags onto it
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          BRANCH: ${{ github.ref_name }}
          # main tip at checkout time. Used as the lease for the branch
          # push so we fail-fast instead of overwriting any commit that
          # landed on main during `pnpm install` / `pnpm build`.
          BASE_SHA: ${{ github.sha }}
        run: |
          git config user.name 'fohte-bot[bot]'
          git config user.email '139195068+fohte-bot[bot]@users.noreply.github.com'
          # `dist/` is gitignored, so force-add the built bundle.
          git add -f dist/
          # Guard against a silent empty commit that would move the tag to a
          # commit not containing `dist/`.
          test -s dist/index.js
          if git diff --cached --quiet; then
            echo "no dist/ changes staged; refusing to commit" >&2
            exit 1
          fi
          git commit -m "chore(release): attach dist/ for ${TAG}"
          # release-please created ${TAG} at the release commit; move it
          # forward one commit to the dist commit we just built.
          git tag -f "${TAG}"
          # SemVer prereleases (`vX.Y.Z-rc.1` etc.) must not advance the
          # floating major tag — `@v1` is documented as the stable channel.
          # `+refs/tags/...` forces the tag move per-ref.
          tag_refs=("+refs/tags/${TAG}")
          if [[ "${TAG}" != *-* ]]; then
            version="${TAG#v}"
            major_tag="v${version%%.*}"
            git tag -f "${major_tag}"
            tag_refs+=("+refs/tags/${major_tag}")
          fi
          # `--atomic` makes branch + tag(s) succeed or fail together, so
          # the remote never has main advanced without the tag also moved.
          # `--force-with-lease` on the branch fails-fast if another push
          # landed on main between checkout and here.
          git push --atomic origin \
            "--force-with-lease=refs/heads/${BRANCH}:${BASE_SHA}" \
            "HEAD:refs/heads/${BRANCH}" \
            "${tag_refs[@]}"
