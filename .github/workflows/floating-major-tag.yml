name: floating-major-tag

# Force-moves the floating major tag (e.g. v1) to the commit that release-please
# just released, so that callers using `uses: fohte/copier-update-action@v1`
# automatically pick up patch and minor releases.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  move-major-tag:
    # release-please tags are vX.Y.Z (no prerelease suffix). Skip any other release.
    if: startsWith(github.event.release.tag_name, 'v') && !github.event.release.prerelease && !github.event.release.draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: true

      # TODO: once .github/workflows/e2e.yml is in place and runs on tag push,
      # gate this job on the E2E workflow being green at the same commit. If
      # E2E fails, skip the force-move and open an issue so the floating major
      # tag never advances to a broken commit. The new vX.Y.Z tag itself stays,
      # so callers pinned to an explicit version are unaffected.

      - name: Compute major tag
        id: major
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          version="${TAG#v}"
          major="${version%%.*}"
          echo "tag=v${major}" >> "$GITHUB_OUTPUT"

      - name: Force-move floating major tag
        env:
          SOURCE_TAG: ${{ github.event.release.tag_name }}
          MAJOR_TAG: ${{ steps.major.outputs.tag }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -f "$MAJOR_TAG" "$SOURCE_TAG"
          git push --force origin "refs/tags/${MAJOR_TAG}"
